artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "A single small access log must be parsed and reduced to three summary values; no tricky edge cases, standard combined-log format."
solution_explanation = "Read /app/access.log line by line, count non-empty lines as total_requests, collect the first field of each line into a set for unique_ips, extract the request path from the quoted request line and take the most common one as top_path, then write the three values as a JSON object to /app/report.json."
verification_explanation = "The verifier loads /app/report.json and asserts the exact computed values (total_requests=6, unique_ips=3, top_path=/index.html) plus that the object carries exactly those three keys."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
